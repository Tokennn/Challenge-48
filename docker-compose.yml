services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${FRONTEND_CONTAINER_NAME:-air-map-frontend}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_APP_NAME=${VITE_APP_NAME:-AirMap}
    networks:
      - frontend_net

  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-air-map-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-air_map}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-air_map}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

volumes:
  postgres_data:

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
